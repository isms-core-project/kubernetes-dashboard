# ==============================================================================================================
# 03-ai-secret.yaml — Anthropic API key for the AI Assistant feature
#
# Replace the placeholder below with your actual key:
#   kubectl create secret generic kubernetes-dashboard-ai \
#     --namespace kubernetes-dashboard \
#     --from-literal=api-key=sk-ant-... \
#     --dry-run=client -o yaml | kubectl apply -f -
# ==============================================================================================================

---
apiVersion: v1
kind: Secret
metadata:
  name: kubernetes-dashboard-ai
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
type: Opaque
stringData:
  api-key: "REPLACE_WITH_ANTHROPIC_API_KEY"
