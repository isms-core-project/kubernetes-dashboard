---
# =============================================================================
# 25-node-exporter.yaml — Node Exporter DaemonSet + VictoriaMetrics scrape config
#
# Compatible: K8s, K3s, Talos Linux
#
# Talos note: --path.rootfs=/host with read-only host root mount bypasses the
# immutable filesystem. No privileged container required.
#
# Deploy:
#   kubectl apply -f 25-node-exporter.yaml
#
# After deploying, patch VictoriaMetrics to enable scraping (one-time):
#   kubectl patch statefulset kubernetes-dashboard-victoriametrics \
#     -n kubernetes-dashboard --type=json -p='[
#       {"op":"add","path":"/spec/template/spec/containers/0/args/-",
#        "value":"--promscrape.config=/etc/vm/scrape.yaml"},
#       {"op":"add","path":"/spec/template/spec/containers/0/volumeMounts/-",
#        "value":{"name":"scrape-config","mountPath":"/etc/vm","readOnly":true}},
#       {"op":"add","path":"/spec/template/spec/volumes/-",
#        "value":{"name":"scrape-config","configMap":{"name":"kubernetes-dashboard-vm-scrape"}}}
#     ]'
#   kubectl rollout restart statefulset/kubernetes-dashboard-victoriametrics -n kubernetes-dashboard
# =============================================================================

# ── RBAC — allow VM to discover node-exporter pods via Kubernetes SD ──────────

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubernetes-dashboard-vm-sd
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: victoriametrics

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubernetes-dashboard-vm-sd
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
rules:
  - apiGroups: [""]
    resources: [pods, endpoints, nodes]
    verbs: [get, list, watch]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubernetes-dashboard-vm-sd
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubernetes-dashboard-vm-sd
subjects:
  - kind: ServiceAccount
    name: kubernetes-dashboard-vm-sd
    namespace: kubernetes-dashboard

# ── VictoriaMetrics scrape config ─────────────────────────────────────────────
# Queries node-exporter pods via Kubernetes service discovery.
# Filters to physical network interfaces only (excludes lo, veth*, cni*, etc).

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubernetes-dashboard-vm-scrape
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
data:
  scrape.yaml: |
    scrape_configs:
      - job_name: node-exporter
        scrape_interval: 30s
        scrape_timeout:  10s
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [kubernetes-dashboard]
        relabel_configs:
          # Keep only node-exporter pods
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            regex: kubernetes-dashboard-node-exporter
            action: keep
          # Use pod IP + port 9100 (hostNetwork means pod IP = node IP)
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:9100
          # Add node name label
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          # Drop high-cardinality collectors we don't use
        metric_relabel_configs:
          - source_labels: [__name__]
            regex: >-
              node_network_(receive|transmit)_bytes_total|
              node_cpu_seconds_total|
              node_memory_(MemAvailable|MemTotal)_bytes|
              node_filesystem_(avail|size)_bytes|
              node_load(1|5|15)
            action: keep
          # Drop virtual/internal network interfaces
          - source_labels: [device]
            regex: "lo|veth.+|cni.+|flannel.+|docker.+|br-.+|tunl.+|kube.+|dummy.+"
            target_label: __tmp_drop
          - source_labels: [__tmp_drop]
            regex: ".+"
            action: drop

# ── Node Exporter DaemonSet ───────────────────────────────────────────────────

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kubernetes-dashboard-node-exporter
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/name: kubernetes-dashboard-node-exporter
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: node-exporter
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kubernetes-dashboard-node-exporter
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubernetes-dashboard-node-exporter
        app.kubernetes.io/part-of: kubernetes-dashboard
    spec:
      # hostNetwork: pod IP = node IP, so VM service discovery gets the right address
      hostNetwork: true
      hostPID:     true
      dnsPolicy:   ClusterFirstWithHostNet
      serviceAccountName: kubernetes-dashboard-api  # reuse existing SA — no extra RBAC needed
      securityContext:
        runAsNonRoot: true
        runAsUser:    65534   # nobody
        runAsGroup:   65534
        fsGroup:      65534
        seccompProfile:
          type: RuntimeDefault
      tolerations:
        # Run on control plane nodes too
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        # Tolerate any other taints (e.g. Talos system nodes)
        - operator: Exists
          effect: NoExecute
          tolerationSeconds: 30
      containers:
        - name: node-exporter
          image: prom/node-exporter:v1.8.2
          imagePullPolicy: IfNotPresent
          args:
            # Talos-compatible: read host filesystem through /host mount
            - --path.rootfs=/host
            - --path.procfs=/host/proc
            - --path.sysfs=/host/sys
            # Enable only the collectors we actually use in the dashboard
            - --collector.disable-defaults
            - --collector.cpu
            - --collector.meminfo
            - --collector.filesystem
            - --collector.netdev          # network rx/tx bytes
            - --collector.loadavg
            - --collector.diskstats
            - --collector.uname
            # Filesystem: skip virtual/container mounts
            - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run/k3s|var/lib/kubelet|var/lib/containerd|run/containerd)($|/)
            - --web.listen-address=:9100
            - --web.telemetry-path=/metrics
          ports:
            - name: metrics
              containerPort: 9100
              hostPort:      9100
              protocol:      TCP
          resources:
            requests:
              cpu:    10m
              memory: 32Mi
            limits:
              cpu:    100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            capabilities:
              drop: [ALL]
              add:  [SYS_TIME]   # required for hwclock; remove if not needed
          volumeMounts:
            - name: root
              mountPath: /host
              readOnly:  true
              mountPropagation: HostToContainer
          livenessProbe:
            httpGet:
              path: /
              port: 9100
            initialDelaySeconds: 5
            periodSeconds:       30
          readinessProbe:
            httpGet:
              path: /
              port: 9100
            initialDelaySeconds: 3
            periodSeconds:       15
      volumes:
        - name: root
          hostPath:
            path: /

# ── Service — used by VM kubernetes_sd for endpoint discovery ─────────────────

---
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-dashboard-node-exporter
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/name: kubernetes-dashboard-node-exporter
    app.kubernetes.io/part-of: kubernetes-dashboard
spec:
  # ClusterNone (headless) so VM sees individual pod endpoints
  clusterIP: None
  selector:
    app.kubernetes.io/name: kubernetes-dashboard-node-exporter
  ports:
    - name: metrics
      port: 9100
      targetPort: 9100
      protocol: TCP
