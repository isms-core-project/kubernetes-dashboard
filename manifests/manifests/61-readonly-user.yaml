# ==============================================================================================================
# 61-readonly-user.yaml — Read-only service account for dashboard login
#
# Bound to the built-in 'view' ClusterRole:
#   - Read-only access to most resources across all namespaces
#   - Cannot create, update, delete, or exec into pods
#   - Cannot read Secrets
#
# Suitable for: monitoring users, on-call engineers, auditors
#
# Get the login token after applying:
#   kubectl get secret readonly-user -n kubernetes-dashboard \
#     -o jsonpath='{.data.token}' | base64 -d
# ==============================================================================================================

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: readonly-user
  namespace: kubernetes-dashboard

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: readonly-user
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: readonly-user
    namespace: kubernetes-dashboard

---
apiVersion: v1
kind: Secret
metadata:
  name: readonly-user
  namespace: kubernetes-dashboard
  annotations:
    kubernetes.io/service-account.name: readonly-user
type: kubernetes.io/service-account-token
