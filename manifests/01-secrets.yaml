# ==============================================================================================================
# 01-secrets.yaml
#
# CSRF key — generate your own before deploying:
#   export CSRF_KEY=$(openssl rand 256 | base64 | tr -d '\n')
#
# Or let deploy.sh generate one automatically on first run.
# ==============================================================================================================

---
# CSRF key shared between api and auth containers
apiVersion: v1
kind: Secret
metadata:
  name: kubernetes-dashboard-csrf
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
type: Opaque
stringData:
  private.key: "${CSRF_KEY}"

# ==============================================================================================================
# Pull secret — only needed if your registry is private (Docker Hub private, self-hosted, etc.)
# Public registries (ghcr.io public packages, Docker Hub public) do NOT need this.
#
# To create:
#   kubectl create secret docker-registry registry-credentials \
#     --docker-server=<your-registry>     \
#     --docker-username=<your-username>   \
#     --docker-password=<your-token>      \
#     -n kubernetes-dashboard
#
# Then uncomment imagePullSecrets in 20-deployments-hardened.yaml for each pod.
# ==============================================================================================================

