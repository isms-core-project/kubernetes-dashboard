# ==============================================================================================================
# 01-secrets.yaml
#
# CSRF key — generate your own before deploying:
#   export CSRF_KEY=$(openssl rand 256 | base64 | tr -d '\n')
#
# Or let deploy.sh generate one automatically on first run.
# ==============================================================================================================

---
# CSRF key shared between api and auth containers
apiVersion: v1
kind: Secret
metadata:
  name: kubernetes-dashboard-csrf
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
type: Opaque
stringData:
  private.key: "${CSRF_KEY}"
