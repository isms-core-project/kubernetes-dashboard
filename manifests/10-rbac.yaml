# ==============================================================================================================
# 10-rbac.yaml — ServiceAccounts, Roles, RoleBindings, ClusterRole, ClusterRoleBinding
# ==============================================================================================================

# ── API ──────────────────────────────────────────────────────────────────────

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubernetes-dashboard-api
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: api

---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: kubernetes-dashboard-api
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: api
rules:
  # Allow Dashboard API to get metrics from metrics-scraper via service proxy
  - apiGroups: [""]
    resources: ["services/proxy"]
    resourceNames:
      - kubernetes-dashboard-metrics-scraper
      - http:kubernetes-dashboard-metrics-scraper
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubernetes-dashboard-api
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubernetes-dashboard-api
subjects:
  - kind: ServiceAccount
    name: kubernetes-dashboard-api
    namespace: kubernetes-dashboard

# ── WEB ──────────────────────────────────────────────────────────────────────

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubernetes-dashboard-web
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: web

---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: kubernetes-dashboard-web
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: web
rules:
  # Allow Dashboard Web to read and update the settings configmap
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["kubernetes-dashboard-web-settings"]
    verbs: ["get", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubernetes-dashboard-web
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: web
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubernetes-dashboard-web
subjects:
  - kind: ServiceAccount
    name: kubernetes-dashboard-web
    namespace: kubernetes-dashboard

# ── METRICS-SCRAPER ───────────────────────────────────────────────────────────

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubernetes-dashboard-metrics-scraper
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: metrics-scraper

---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: kubernetes-dashboard-metrics-scraper
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: metrics-scraper
rules:
  # Allow Metrics Scraper to read pod and node metrics from metrics-server
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubernetes-dashboard-metrics-scraper
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: metrics-scraper
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubernetes-dashboard-metrics-scraper
subjects:
  - kind: ServiceAccount
    name: kubernetes-dashboard-metrics-scraper
    namespace: kubernetes-dashboard
