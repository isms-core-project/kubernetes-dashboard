# ==============================================================================================================
# 99-network-policy.yaml — NetworkPolicies for kubernetes-dashboard namespace
#
# Pattern: default-deny-all + shared DNS egress + per-pod allow rules
#
# Traffic flows locked down:
#   external → kong (LoadBalancer)
#   kong     → auth (8000), api (8000), web (8080)
#   api      → metrics-scraper (8000)
#   api      → k8s API server (443/6443) + Anthropic external (443)
#   auth     → k8s API server (443/6443)
#   metrics-scraper → broad egress (must scrape across all namespaces)
# ==============================================================================================================

# ── Default deny all ingress + egress for the namespace ──────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: kubernetes-dashboard
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

# ── Allow DNS egress for all pods (kube-dns) ─────────────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: kubernetes-dashboard
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

# ── Kong — accepts external traffic, routes to backend pods ──────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kubernetes-dashboard-kong
  namespace: kubernetes-dashboard
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kubernetes-dashboard-kong
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # LoadBalancer traffic from anywhere (MetalLB 10.0.0.60)
    - ports:
        - port: 8000
          protocol: TCP
        - port: 8443
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kubernetes-dashboard-auth
      ports:
        - port: 8000
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kubernetes-dashboard-api
      ports:
        - port: 8000
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kubernetes-dashboard-web
      ports:
        - port: 8080
          protocol: TCP

# ── Web — ingress from Kong only, no egress required (static nginx) ──────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kubernetes-dashboard-web
  namespace: kubernetes-dashboard
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kubernetes-dashboard-web
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kubernetes-dashboard-kong
      ports:
        - port: 8080
          protocol: TCP

# ── Auth — ingress from Kong, egress to Kubernetes API server ─────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kubernetes-dashboard-auth
  namespace: kubernetes-dashboard
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kubernetes-dashboard-auth
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kubernetes-dashboard-kong
      ports:
        - port: 8000
          protocol: TCP
  egress:
    # Kubernetes API server — port 443 (ClusterIP service) and 6443 (direct/VIP)
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP

# ── API — ingress from Kong, egress to metrics-scraper + VictoriaMetrics + k8s API + Anthropic ─
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kubernetes-dashboard-api
  namespace: kubernetes-dashboard
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kubernetes-dashboard-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kubernetes-dashboard-kong
      ports:
        - port: 8000
          protocol: TCP
  egress:
    # metrics-scraper sidecar
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kubernetes-dashboard-metrics-scraper
      ports:
        - port: 8000
          protocol: TCP
    # VictoriaMetrics (optional — only active when VM_ENDPOINT is set)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kubernetes-dashboard-victoriametrics
      ports:
        - port: 8428
          protocol: TCP
    # Kubernetes API server (443 via ClusterIP, 6443 direct to control plane),
    # Anthropic API (api.anthropic.com:443), and Microsoft Graph API
    # (login.microsoftonline.com:443 + graph.microsoft.com:443) for notifications
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP

# ── Metrics Scraper — ingress from API pod only, broad egress to scrape ──────
# Note: metrics-scraper must reach pods across all namespaces to collect
# resource usage data. Restricting egress would break efficiency metrics.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kubernetes-dashboard-metrics-scraper
  namespace: kubernetes-dashboard
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kubernetes-dashboard-metrics-scraper
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kubernetes-dashboard-api
      ports:
        - port: 8000
          protocol: TCP
  egress:
    # Broad egress required — must scrape metrics.k8s.io across all namespaces
    # (also covers VictoriaMetrics push on port 8428 when VM_ENDPOINT is set)
    - {}

# ── VictoriaMetrics — ingress from API + metrics-scraper, no egress needed ───
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kubernetes-dashboard-victoriametrics
  namespace: kubernetes-dashboard
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kubernetes-dashboard-victoriametrics
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # API pod reads historical metrics via PromQL
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kubernetes-dashboard-api
      ports:
        - port: 8428
          protocol: TCP
    # Metrics-scraper pushes data via remote_write
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kubernetes-dashboard-metrics-scraper
      ports:
        - port: 8428
          protocol: TCP
  egress: []
