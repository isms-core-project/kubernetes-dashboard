    app.kubernetes.io/name: kubernetes-dashboard-metrics-scraper
  ports:
    - name: metrics-scraper
      port: 8000
      targetPort: 8000
      protocol: TCP

---
# Kong proxy — public entry point for the dashboard
#
# Choose the access mode that fits your cluster:
#
#   A) MetalLB (bare-metal, on-prem)
#      Uncomment the annotations block and set your IP.
#      type: LoadBalancer assigns the IP via MetalLB.
#
#   B) Cloud LoadBalancer (AWS, GCP, Azure, etc.)
#      Leave annotations commented out.
#      type: LoadBalancer is enough — the cloud assigns an IP automatically.
#
#   C) NodePort (no LoadBalancer controller, local dev)
#      Change type to NodePort and remove/ignore annotations.
#      Access via http://<node-ip>:<nodePort>
#
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-dashboard-kong-proxy
  namespace: kubernetes-dashboard
  # annotations:
  #   metallb.io/loadBalancerIPs: "x.x.x.x"   # MetalLB only — set your desired IP
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: kong
spec:
  type: LoadBalancer    # Change to NodePort if you have no LoadBalancer controller
  selector:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/name: kubernetes-dashboard-kong
  ports:
    - name: proxy
      port: 80
      targetPort: 8000
      protocol: TCP
    - name: proxy-ssl
      port: 443
      targetPort: 8443
      protocol: TCP
