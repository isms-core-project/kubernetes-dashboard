# ==============================================================================================================
# 04-notifications-secret.yaml — Microsoft Graph API health notification credentials
#
# The dashboard API pod sends a health digest directly via the Microsoft Graph API.
# All fields are optional — the feature is a graceful no-op if GRAPH_TENANT_ID is not set.
#
# Azure App Registration requirements:
#   API permissions: Mail.Send (Application, not Delegated)
#   The MAIL_FROM address must be a licensed mailbox in the tenant.
# ==============================================================================================================

---
apiVersion: v1
kind: Secret
metadata:
  name: kubernetes-dashboard-notifications
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: api
type: Opaque
stringData:
  # Azure AD app registration — set all three to enable notifications
  GRAPH_TENANT_ID: ""       # e.g. xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
  GRAPH_CLIENT_ID: ""       # App registration client ID
  GRAPH_CLIENT_SECRET: ""   # App registration client secret

  # Sender — must be a licensed mailbox in the tenant with Mail.Send permission
  MAIL_FROM: ""             # e.g. dashboard@example.com
  MAIL_FROM_NAME: "Kubernetes Dashboard"

  # Recipient(s) — comma-separated
  MAIL_TO: ""               # e.g. admin@example.com

  # Digest frequency in hours (default: 24)
  NOTIFY_INTERVAL_H: "24"
