# ── METRICS-SCRAPER ───────────────────────────────────────────────────────────

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubernetes-dashboard-metrics-scraper
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: metrics-scraper

---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: kubernetes-dashboard-metrics-scraper
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: metrics-scraper
rules:
  # Allow Metrics Scraper to read pod and node metrics from metrics-server
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubernetes-dashboard-metrics-scraper
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: metrics-scraper
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubernetes-dashboard-metrics-scraper
subjects:
  - kind: ServiceAccount
    name: kubernetes-dashboard-metrics-scraper
    namespace: kubernetes-dashboard

# ── AUTH ──────────────────────────────────────────────────────────────────────

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubernetes-dashboard-auth
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: auth

---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: kubernetes-dashboard-auth
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: auth
rules:
  # Auth pod validates user bearer tokens by submitting TokenReview to the API server
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubernetes-dashboard-auth
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: auth
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubernetes-dashboard-auth
subjects:
  - kind: ServiceAccount
    name: kubernetes-dashboard-auth
    namespace: kubernetes-dashboard

# ── API ClusterRole — needed for notification scheduler audit report ──────────

---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: kubernetes-dashboard-api
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: api
rules:
  # Audit report lists workloads across all namespaces for health digest notifications
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets"]
    verbs: ["list"]
  # Health digest: pod snapshot and warning events cluster-wide
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["get", "list", "watch"]
  # Storage usage + node snapshot for health digest
  - apiGroups: [""]
    resources: ["nodes", "nodes/stats"]
    verbs: ["get", "list"]
  # Cert tracker reads TLS secrets for health digest cert alerts
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  # Kubescape: apply GeneratedNetworkPolicy as a real NetworkPolicy
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "create", "patch"]
  # Cert Manager: read certificates, issuers, and cluster issuers (detection-gated)
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates", "issuers", "clusterissuers"]
    verbs: ["get", "list"]
  # MetalLB: read IP address pools and L2 advertisements (detection-gated)
  - apiGroups: ["metallb.io"]
    resources: ["ipaddresspools", "l2advertisements"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubernetes-dashboard-api
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubernetes-dashboard-api
subjects:
  - kind: ServiceAccount
    name: kubernetes-dashboard-api
    namespace: kubernetes-dashboard

