# ==============================================================================================================
# 10-rbac.yaml — ServiceAccounts, Roles, RoleBindings, ClusterRole, ClusterRoleBinding
# ==============================================================================================================

# ── API ──────────────────────────────────────────────────────────────────────

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubernetes-dashboard-api
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: api

---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: kubernetes-dashboard-api
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: api
rules:
  # Allow Dashboard API to get metrics from metrics-scraper via service proxy
  - apiGroups: [""]
    resources: ["services/proxy"]
    resourceNames:
      - kubernetes-dashboard-metrics-scraper
      - http:kubernetes-dashboard-metrics-scraper
    verbs: ["get"]
  # Allow Dashboard API to read and update the global settings ConfigMap
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["kubernetes-dashboard-web-settings"]
    verbs: ["get", "update", "create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubernetes-dashboard-api
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubernetes-dashboard-api
subjects:
  - kind: ServiceAccount
    name: kubernetes-dashboard-api
    namespace: kubernetes-dashboard

