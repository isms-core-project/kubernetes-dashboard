# 01-secrets.yaml
#
# The CSRF secret is NOT in this file — create it with the command below before applying manifests:
#
#   kubectl -n kubernetes-dashboard create secret generic kubernetes-dashboard-csrf \
#     --from-literal=private.key="$(openssl rand 256 | base64 | tr -d '\n')"
#
# Save the generated key if you want to reuse it on future deploys (avoids invalidating sessions).
