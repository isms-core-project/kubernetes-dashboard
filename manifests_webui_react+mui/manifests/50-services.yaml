# ==============================================================================================================
# 50-services.yaml — All services (backend ClusterIP + Kong NodePort)
# ==============================================================================================================

---
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-dashboard-auth
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: auth
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/name: kubernetes-dashboard-auth
  ports:
    - name: auth
      port: 8000
      targetPort: 8000
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-dashboard-api
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/name: kubernetes-dashboard-api
  ports:
    - name: api
      port: 8000
      targetPort: 8000
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-dashboard-web
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/name: kubernetes-dashboard-web
  ports:
    - name: web
      port: 8080
      targetPort: 8080
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-dashboard-metrics-scraper
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: metrics-scraper
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/name: kubernetes-dashboard-metrics-scraper
  ports:
    - name: metrics-scraper
      port: 8000
      targetPort: 8000
      protocol: TCP

---
# ==============================================================================================================
# Kong proxy — NodePort (default, works on any cluster)
#
# Access the dashboard at http://<node-ip>:30080
# Change nodePort values below if they conflict with existing services.
#
# ── MetalLB option (bare-metal LoadBalancer) ─────────────────────────────────
# If you have MetalLB, replace type: NodePort with type: LoadBalancer, remove the
# nodePort fields, and optionally pin an IP via the annotation:
#
#   annotations:
#     metallb.io/loadBalancerIPs: "<YOUR-IP>"
#
# INSTALL MetalLB:
#   MetalLB_RTAG=$(curl -s https://api.github.com/repos/metallb/metallb/releases/latest | grep tag_name | cut -d '"' -f 4 | sed 's/v//')
#   curl -s https://raw.githubusercontent.com/metallb/metallb/v${MetalLB_RTAG}/config/manifests/metallb-native.yaml | kubectl apply -f -
#   kubectl get pods -n metallb-system --watch
#
# CONFIGURE IP pool and L2 advertisement (apply after MetalLB pods are ready):
#
#   kubectl apply -f - <<EOF
#   apiVersion: metallb.io/v1beta1
#   kind: IPAddressPool
#   metadata:
#     name: production
#     namespace: metallb-system
#   spec:
#     addresses:
#     - 192.168.1.200-192.168.1.220  # Adjust to your LAN range
#     autoAssign: true
#   ---
#   apiVersion: metallb.io/v1beta1
#   kind: L2Advertisement
#   metadata:
#     name: l2-advert
#     namespace: metallb-system
#   spec:
#     ipAddressPools:
#     - production
#   EOF
# ==============================================================================================================

# Kong proxy — NodePort entry point
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-dashboard-kong-proxy
  namespace: kubernetes-dashboard
  labels:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/component: kong
spec:
  type: NodePort
  selector:
    app.kubernetes.io/part-of: kubernetes-dashboard
    app.kubernetes.io/name: kubernetes-dashboard-kong
  ports:
    - name: proxy
      port: 80
      targetPort: 8000
      nodePort: 30080
      protocol: TCP
    - name: proxy-ssl
      port: 443
      targetPort: 8443
      nodePort: 30443
      protocol: TCP
